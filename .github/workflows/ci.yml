name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: xephon_admin
          POSTGRES_USER: xephon_admin
          POSTGRES_PASSWORD: xephon_admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xephon_admin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: xephon_admin
      POSTGRES_USER: xephon_admin
      POSTGRES_PASSWORD: xephon_admin
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: xephon
      KEYCLOAK_CLIENT_ID: xephon-admin
      # Service-account secret used by tests that call Keycloak admin API;
      # the real value lives in GitHub Secrets for non-CI environments.
      KEYCLOAK_ADMIN_CLIENT_SECRET: test-secret-ci

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Format check (ruff)
        working-directory: backend
        run: ruff format --check .

      - name: Run database migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Migration round-trip (downgrade → upgrade)
        working-directory: backend
        run: alembic downgrade -1 && alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest -v --tb=short --cov=app --cov-report=xml --junitxml=test-results.xml

      - name: Write job summary
        if: always()
        working-directory: backend
        run: |
          python ${{ github.workspace }}/scripts/pytest_summary.py test-results.xml \
            --title "Backend tests (Python ${{ matrix.python-version }})" \
            --coverage-xml coverage.xml >> "$GITHUB_STEP_SUMMARY"

      - name: Dependency audit (pip-audit)
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit --progress-spinner=off
        continue-on-error: true

  frontend-test:
    name: Frontend checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: pnpm typecheck

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Build
        working-directory: frontend
        run: pnpm build

      - name: Dependency audit (pnpm audit)
        working-directory: frontend
        run: pnpm audit --audit-level moderate
        continue-on-error: true
